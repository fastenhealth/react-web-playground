<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fasten Connect React Web Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body, #root { width: 100%; height: 100%; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(circle at 20% 50%, #5b47fb 0%, rgba(91, 71, 251, 0.4) 40%, rgba(255, 255, 255, 0) 70%),
                    radial-gradient(circle at 0% 100%, #5b47fb 0%, rgba(91, 71, 251, 0.2) 50%, rgba(255, 255, 255, 0) 100%),
                    linear-gradient(135deg, #ffffff 0%, #f8f9fa 50%, #ffffff 100%);
        background-attachment: fixed;
        min-height: 100vh;
      }

      .app-container {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .app-wrapper {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 3rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 640px;
      }

      .app-content {
        text-align: center;
      }

      .app-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: #1a1a2e;
      }

      .app-description {
        color: #4a4a6a;
        margin-bottom: 2rem;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .env-warning {
        padding: 1rem;
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 8px;
        color: #856404;
      }

      .env-warning code {
        background: rgba(255, 255, 255, 0.5);
        padding: 2px 6px;
        border-radius: 4px;
      }

      /* ── Demo sections ─────────────────────────────────── */

      .demo-sections {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        text-align: left;
      }

      .demo-section {
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 12px;
      }

      .demo-section-title {
        font-size: 1rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 0.35rem;
      }

      .demo-section-desc {
        font-size: 0.875rem;
        color: #4a4a6a;
        line-height: 1.5;
        margin-bottom: 1rem;
      }

      .demo-section-desc code {
        background: rgba(91, 71, 251, 0.08);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.8rem;
      }

      /* ── Buttons ────────────────────────────────────────── */

      .connect-button {
        padding: 10px 20px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background: #0d6efd;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      .connect-button:hover {
        background: #0b5ed7;
      }

      .connect-button:active {
        transform: scale(0.98);
      }

      .connect-button.secondary {
        background: #6c757d;
      }

      .connect-button.secondary:hover {
        background: #5a6268;
      }

      .ref-buttons {
        display: flex;
        gap: 0.75rem;
      }

      /* ── Custom trigger link ────────────────────────────── */

      .custom-trigger {
        color: #0d6efd;
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 3px;
        cursor: pointer;
        transition: color 0.15s;
      }

      .custom-trigger:hover {
        color: #0b5ed7;
      }

      /* ── Connect mode switcher ──────────────────────────── */

      .mode-switcher {
        display: inline-flex;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        overflow: hidden;
      }

      .mode-option {
        padding: 8px 18px;
        font-size: 0.85rem;
        font-weight: 500;
        color: #495057;
        background: #fff;
        border: none;
        border-right: 1px solid #dee2e6;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      .mode-option:last-child {
        border-right: none;
      }

      .mode-option:hover:not(.active) {
        background: #f1f3f5;
      }

      .mode-option.active {
        background: #0d6efd;
        color: #fff;
      }

      .mode-hint {
        margin-top: 0.6rem;
        font-size: 0.78rem;
        color: #6c757d;
      }

      .mode-hint code {
        background: rgba(91, 71, 251, 0.08);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
